<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Michael Mehni</title>

<style>
body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: #f5f7fa;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  margin: 0;
}

.card {
  background: white;
  padding: 40px 30px;
  max-width: 420px;
  width: 100%;
  border-radius: 16px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.1);
  text-align: center;
  position: relative;
}

.logo {
  max-width: 200px;
  margin-bottom: 20px;
}

.profile-pic {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  object-fit: cover;
  margin-bottom: 15px;
  border: 3px solid #0077cc;
}

h1 {
  margin: 5px 0;
  font-size: 24px;
  color: #333;
}

p {
  color: #555;
  margin: 6px 0;
  font-size: 14px;
}

.button {
  display: inline-block;
  margin-top: 20px;
  padding: 12px 24px;
  background: #0077cc;
  color: white;
  text-decoration: none;
  border-radius: 8px;
  font-size: 16px;
  transition: background 0.3s;
}

.button:hover {
  background: #005fa3;
}

.link {
  display: block;
  margin-top: 15px;
  color: #0077cc;
  text-decoration: none;
  font-size: 14px;
}

.link:hover {
  text-decoration: underline;
}
</style>
</head>

<body>

<div class="card">

  <!-- City Logo -->
  <img class="logo" src="city-logo.png" alt="City of Prince George Logo">

      michael.mehni@princegeorge.ca

  </p>

    Save Contact
  </a>

  <a class="link" href="https://www.linkedin.com/in/mmehni/" target="_blank">
    LinkedIn Profile
  </a>

</html>
