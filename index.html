<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Michael Mehni</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  background: #eef2f6;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  margin: 0;
}

.card {
  background: #ffffff;
  padding: 36px 32px;
  max-width: 420px;
  width: 100%;
  border-radius: 12px;
  box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
  text-align: center;
}

/* Logo */
.logo {
  max-width: 180px;
  margin-bottom: 24px;
}

/* Optional Profile Picture */
.profile-pic {
  width: 96px;
  height: 96px;
  border-radius: 50%;
  object-fit: cover;
  margin-bottom: 18px;
  border: 2px solid #d0d7de;
}

/* Typography */
h1 {
  margin: 0;
  font-size: 22px;
  font-weight: 600;
  color: #1f2933;
}

.role {
  margin-top: 6px;
  font-size: 14px;
  color: #4b5563;
}

.organization {
  margin-top: 2px;
  font-size: 14px;
  color: #374151;
  font-weight: 500;
}

/* Divider */
.divider {
  height: 1px;
  background: #e5e7eb;
  margin: 20px 0;
}

/* Contact */
.contact a {
  color: #1d4ed8;
  text-decoration: none;
  font-size: 14px;
}

.contact a:hover {
  text-decoration: underline;
}

/* Button */
.button {
  display: inline-block;
  margin-top: 22px;
  padding: 11px 22px;
  background: #1d4ed8;
  color: #ffffff;
  text-decoration: none;
  border-radius: 6px;
  font-size: 14px;
  font-weight: 500;
  transition: background 0.2s ease;
}

.button:hover {
  background: #1e40af;
}

/* Secondary Link */
.link {
  display: block;
  margin-top: 16px;
  color: #1d4ed8;
  text-decoration: none;
  font-size: 13px;
}

.link:hover {
  text-decoration: underline;
}
</style>
</head>

<body>

<div class="card">

  <!-- City Logo -->
  <img class="logo" src="city-logo.png" alt="City of Prince George Logo">

  <!-- Optional Profile Picture -->
  <!-- <img class="profile-pic" src="profile.jpg" alt="Michael Mehni"> -->

  <h1>Michael Mehni</h1>
  <div class="role">Asset Management Engineering Assistant</div>
  <div class="organization">City of Prince George</div>

  <div class="divider"></div>

  <div class="contact">
    <a href="mailto:michael.mehni@princegeorge.ca">
      michael.mehni@princegeorge.ca
    </a>
  </div>

  <a class="button" href="contact.vcf" download>
    Download Contact
  </a>

  <a class="link" href="https://www.linkedin.com/in/mmehni/" target="_blank">
    LinkedIn Profile
  </a>

</div>

</body>
</html>
